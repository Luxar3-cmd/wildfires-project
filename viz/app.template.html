<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pipeline ERA5 — grilla, KDTree y salto a tierra</title>
<style>
  :root { --bg:#0f1216; --panel:#171c23; --line:#2a323d; --txt:#e6edf3; --muted:#9aa7b4; --accent:#16a34a; }
  * { box-sizing: border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--txt);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  #root { height:100%; }
  .app { display:flex; height:100%; }
  .side { width:300px; min-width:300px; background:var(--panel); border-right:1px solid var(--line);
    overflow-y:auto; padding:12px 14px; }
  .side h1 { font-size:15px; margin:0 0 2px; }
  .side .sub { color:var(--muted); font-size:11px; margin-bottom:12px; line-height:1.4; }
  .grp { border-top:1px solid var(--line); padding:10px 0; }
  .grp h2 { font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); margin:0 0 8px; }
  .row { display:flex; align-items:center; gap:6px; margin:4px 0; font-size:12px; flex-wrap:wrap; }
  .seg { display:flex; border:1px solid var(--line); border-radius:6px; overflow:hidden; }
  .seg button { background:transparent; color:var(--muted); border:0; padding:4px 8px; font-size:11px; cursor:pointer; }
  .seg button.on { background:var(--accent); color:#04130a; font-weight:600; }
  label.ck { display:flex; align-items:center; gap:6px; font-size:12px; cursor:pointer; }
  .chip { display:inline-block; width:11px; height:11px; border-radius:3px; flex:0 0 auto; }
  input[type=range]{ width:100%; }
  input[type=number], input[type=text], select { background:#0d1117; color:var(--txt);
    border:1px solid var(--line); border-radius:5px; padding:3px 6px; font-size:12px; }
  .legend .row { justify-content:space-between; }
  .cnt { color:var(--muted); font-variant-numeric:tabular-nums; }
  .stage { flex:1; position:relative; overflow:hidden; }
  canvas { position:absolute; inset:0; }
  .hint { position:absolute; left:10px; bottom:10px; font-size:11px; color:var(--muted);
    background:rgba(0,0,0,.45); padding:4px 8px; border-radius:6px; }
  .zoombtns { position:absolute; right:12px; top:12px; display:flex; flex-direction:column; gap:4px; }
  .zoombtns button { width:30px; height:30px; font-size:16px; background:var(--panel);
    color:var(--txt); border:1px solid var(--line); border-radius:6px; cursor:pointer; }
  .detail { position:absolute; right:12px; bottom:12px; width:280px; background:var(--panel);
    border:1px solid var(--line); border-radius:8px; padding:10px 12px; font-size:12px; }
  .detail h3 { margin:0 0 6px; font-size:13px; }
  .detail table { width:100%; border-collapse:collapse; }
  .detail td { padding:2px 0; } .detail td:last-child { text-align:right; color:var(--muted); }
  .detail .close { position:absolute; top:6px; right:9px; cursor:pointer; color:var(--muted); }
  .tip { position:fixed; pointer-events:none; background:#000c; border:1px solid var(--line);
    border-radius:5px; padding:3px 7px; font-size:11px; z-index:9; white-space:nowrap; }
  small { color:var(--muted); }
</style>
</head>
<body>
<div id="root"></div>
<!--__REACT__-->
<script>
const DATA = __DATA__;

/* ---------- decode helpers ---------- */
const b64bytes = (s) => { const bin = atob(s); const u = new Uint8Array(bin.length);
  for (let i=0;i<bin.length;i++) u[i]=bin.charCodeAt(i); return u; };
const f32 = (s) => new Float32Array(b64bytes(s).buffer);

const F = DATA.fires;
const lat = f32(F.lat_b64), lon = f32(F.lon_b64);
const nlLat = f32(F.nl_lat_b64), nlLon = f32(F.nl_lon_b64), nlKm = f32(F.nl_km_b64);
const snap = f32(F.snap_b64), area = f32(F.area_b64), frp = f32(F.frp_b64);
const year = F.year, region = F.region, quality = F.quality, L1 = F.l1, L2 = F.l2, inBox = F.in_bbox;
const N = DATA.meta.n;
const QL = DATA.meta.quality_levels;          // ["good","land_snapped",...]
const RL = DATA.meta.region_levels;
const BB = DATA.meta.bbox;
const GRID = DATA.grid;
const gridMaskBits = Uint8Array.from(GRID.land_mask_bits);
const isLand = (r,c) => { const idx = r*GRID.nlon + c; return (gridMaskBits[idx>>3] >> (7-(idx&7))) & 1; };
const LANDX = f32(DATA.land_cells.lon_b64), LANDY = f32(DATA.land_cells.lat_b64);

const Q = Object.fromEntries(QL.map((q,i)=>[q,i]));
const yearsAll = Array.from(new Set(year)).filter(y=>y>0).sort();
const Y0 = yearsAll[0], Y1 = yearsAll[yearsAll.length-1];

// Acota la vista a Chile + márgenes para no perderse en el vacío.
const clampView = (v)=>({
  cx: Math.min(-66, Math.max(-78, v.cx)),
  cy: Math.min(-17, Math.max(-57, v.cy)),
  scale: Math.min(2200, Math.max(6, v.scale)),
});

/* ---------- colors ---------- */
const QCOLORS = { good:'#3b82f6', land_snapped:'#16a34a', water:'#9aa7b4',
  out_of_coverage:'#4b5563', poor:'#f59e0b', missing:'#6b7280' };
const qcolorOf = (i) => QCOLORS[QL[quality[i]]] || '#888';
const labelColorOf = (i) => { const a=L1[i], b=L2[i];
  if (a&&b) return '#a855f7'; if (b) return '#dc2626'; if (a) return '#f59e0b'; return '#64748b'; };
const SNAP_MAX = 6;
const snapColorOf = (i) => { const s = snap[i];
  if (!(s>0)) return '#374151';
  const t = Math.min(s/SNAP_MAX,1);            // 0=gris -> 1=verde claro
  const g = Math.round(120+120*t), r = Math.round(150-110*t), bl=Math.round(150-110*t);
  return `rgb(${r},${g},${bl})`; };

/* ---------- KDTree over land cells (para partición y traza de query) ---------- */
const COSLAT = Math.cos(((BB.south+BB.north)/2)*Math.PI/180) || 1;
function buildKD(idx, depth, bounds) {
  if (!idx.length) return null;
  const axis = depth % 2;                       // 0=x(lon escalada), 1=y(lat)
  const key = (i)=> axis===0 ? LANDX[i]*COSLAT : LANDY[i];
  idx.sort((a,b)=>key(a)-key(b));
  const m = idx>>0, mid = idx.length>>1;
  const node = { i: idx[mid], axis, split: key(idx[mid]), bounds, depth };
  const L = idx.slice(0,mid), R = idx.slice(mid+1);
  const bL = {...bounds}, bR = {...bounds};
  if (axis===0){ bL.xmax = node.split; bR.xmin = node.split; }
  else { bL.ymax = node.split; bR.ymin = node.split; }
  node.left = buildKD(L, depth+1, bL); node.right = buildKD(R, depth+1, bR);
  return node;
}
const KDBOUNDS = { xmin: BB.west*COSLAT, xmax: BB.east*COSLAT, ymin: BB.south, ymax: BB.north };
const KDROOT = buildKD([...Array(LANDX.length).keys()], 0, KDBOUNDS);

function kdNearestTrace(qlon, qlat) {            // devuelve {best, visited:[nodeIdx...]}
  const qx = qlon*COSLAT, qy = qlat; let best=-1, bd=Infinity; const visited=[];
  (function rec(node){ if(!node) return; visited.push(node.i);
    const px = LANDX[node.i]*COSLAT, py = LANDY[node.i];
    const d = (px-qx)**2 + (py-qy)**2; if (d<bd){bd=d; best=node.i;}
    const diff = node.axis===0 ? qx-px : qy-py;
    const near = diff<0?node.left:node.right, far = diff<0?node.right:node.left;
    rec(near); if (diff*diff < bd) rec(far);
  })(KDROOT);
  return { best, visited };
}

/* ---------- spatial hash para picking ---------- */
const BIN = 0.25;
const bins = new Map();
const bkey = (lo,la)=> Math.floor(lo/BIN)+'_'+Math.floor(la/BIN);
for (let i=0;i<N;i++){ if(!isFinite(lat[i])||!isFinite(lon[i])) continue;
  const k=bkey(lon[i],lat[i]); (bins.get(k)||bins.set(k,[]).get(k)).push(i); }

/* ============================================================ */
const { useState, useRef, useEffect, useMemo, useCallback } = React;
const h = React.createElement;

function App() {
  const baseRef = useRef(null), ovRef = useRef(null), wrapRef = useRef(null);
  const [size, setSize] = useState({w: 800, h: 600});
  // vista: centro lon/lat + escala (px por grado de lat)
  const [view, setView] = useState(() => ({ cx:(BB.west+BB.east)/2, cy:-38, scale: 9 }));
  const [colorMode, setColorMode] = useState('quality');   // quality|label|snap
  const [sizeMode, setSizeMode] = useState('fixed');       // fixed|area|frp
  const [layers, setLayers] = useState({ chile:true, fires:true, grid:true, kdtree:false, coast:true, arrows:true });
  const [kdDepth, setKdDepth] = useState(7);
  const [filters, setFilters] = useState({
    regions: new Set(RL.keys ? [] : []), // placeholder; usamos set de índices
    quals: new Set(QL.map((_,i)=>i)),
    labels: new Set(['none','l1','l2']),
    y0: Y0, y1: Y1, snapMin: 0, snapMax: 6, onlySnapped: false,
  });
  const [regionSel, setRegionSel] = useState(new Set(RL.map((_,i)=>i)));
  const [selected, setSelected] = useState(-1);
  const [hover, setHover] = useState(-1);
  const [tip, setTip] = useState(null);
  const animRef = useRef({ t:0, raf:0 });

  /* ---- proyección ---- */
  const proj = useMemo(()=>{
    const cos = Math.cos(view.cy*Math.PI/180) || 1;
    const W=size.w, H=size.h;
    const toX = (lo)=> (lo-view.cx)*view.scale*cos + W/2;
    const toY = (la)=> (view.cy-la)*view.scale + H/2;
    const toLon = (x)=> (x-W/2)/(view.scale*cos) + view.cx;
    const toLat = (y)=> view.cy - (y-H/2)/view.scale;
    return { toX, toY, toLon, toLat, cos };
  },[view,size]);

  const showDetail = view.scale > 35;   // LOD: grilla/kdtree/saltos al acercar

  /* ---- filtro por incendio ---- */
  const pass = useCallback((i)=>{
    if (!regionSel.has(region[i])) return false;
    if (!filters.quals.has(quality[i])) return false;
    const lab = (L1[i]&&L2[i])?'l1':(L2[i]?'l2':(L1[i]?'l1':'none')); // l2/l1 chips
    const labKey = L2[i]?'l2':(L1[i]?'l1':'none');
    if (!filters.labels.has(labKey)) return false;
    if (year[i] && (year[i]<filters.y0 || year[i]>filters.y1)) return false;
    const s = snap[i];
    if (filters.onlySnapped && !(s>0)) return false;
    if (s>0 && (s<filters.snapMin || s>filters.snapMax)) return false;
    return true;
  },[regionSel,filters]);

  /* ---- radio del punto ---- */
  const radiusOf = useCallback((i)=>{
    if (sizeMode==='area'){ const a=area[i]; return a>0?Math.min(1+Math.sqrt(a)/6,9):1; }
    if (sizeMode==='frp'){ const f=frp[i]; return f>0?Math.min(1+Math.sqrt(f)/3,9):1; }
    return showDetail?2.2:1.4;
  },[sizeMode,showDetail]);

  const colorOf = useCallback((i)=> colorMode==='quality'?qcolorOf(i)
    : colorMode==='label'?labelColorOf(i) : snapColorOf(i),[colorMode]);

  /* ---- resize ---- */
  useEffect(()=>{
    const el = wrapRef.current; if(!el) return;
    const ro = new ResizeObserver(()=>{ const r=el.getBoundingClientRect();
      setSize({w:Math.max(50,r.width|0), h:Math.max(50,r.height|0)}); });
    ro.observe(el); return ()=>ro.disconnect();
  },[]);

  /* ---- DPR setup ---- */
  const setupCanvas = (cv)=>{ const dpr=Math.min(window.devicePixelRatio||1,2);
    cv.width=size.w*dpr; cv.height=size.h*dpr; cv.style.width=size.w+'px'; cv.style.height=size.h+'px';
    const ctx=cv.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0); return ctx; };

  /* ---- dibujo capa base ---- */
  useEffect(()=>{
    const cv = baseRef.current; if(!cv) return; const ctx = setupCanvas(cv);
    ctx.clearRect(0,0,size.w,size.h);
    // Fondo océano: cualquier zona vacía se lee como mar, nunca como un vacío negro
    ctx.fillStyle='#0d1b2a'; ctx.fillRect(0,0,size.w,size.h);
    // Chile (tierra un poco más clara que el océano + contorno siempre)
    if (layers.chile && DATA.chile){ ctx.lineWidth=1; ctx.strokeStyle='#46525f'; ctx.fillStyle='#17222e';
      for (const ring of DATA.chile){ ctx.beginPath();
        for (let k=0;k<ring.length;k++){ const x=proj.toX(ring[k][0]), y=proj.toY(ring[k][1]);
          k?ctx.lineTo(x,y):ctx.moveTo(x,y);} ctx.closePath(); ctx.fill(); ctx.stroke(); } }
    // grilla ERA5 (LOD)
    if (showDetail && (layers.grid||layers.coast)){
      const dLat=GRID.lats.length>1?GRID.lats[0]-GRID.lats[1]:0.1;
      const dLon=GRID.lons.length>1?GRID.lons[1]-GRID.lons[0]:0.05;
      for (let r=0;r<GRID.nlat;r++) for (let c=0;c<GRID.nlon;c++){
        const la=GRID.lats[r], lo=GRID.lons[c];
        const x=proj.toX(lo-dLon/2), y=proj.toY(la+dLat/2);
        const w=proj.toX(lo+dLon/2)-x, hh=proj.toY(la-dLat/2)-y;
        if (x+w<0||x>size.w||y+hh<0||y>size.h) continue;
        const land=isLand(r,c);
        if (layers.grid){ ctx.fillStyle = land?'rgba(34,80,52,.42)':'rgba(20,40,70,.38)';
          ctx.fillRect(x,y,w,hh);
          ctx.strokeStyle='rgba(190,215,230,.35)'; ctx.lineWidth=0.6; ctx.strokeRect(x,y,w,hh); }
        if (layers.coast){ ctx.strokeStyle='rgba(255,255,255,.2)'; ctx.lineWidth=0.6; ctx.strokeRect(x,y,w,hh); }
      }
    }
    // KDTree partición (LOD + capa)
    if (showDetail && layers.kdtree){
      ctx.lineWidth=0.6;
      (function walk(node){ if(!node||node.depth>=kdDepth) return;
        const b=node.bounds; ctx.strokeStyle = node.axis===0?'rgba(245,158,11,.5)':'rgba(56,189,248,.45)';
        ctx.beginPath();
        if (node.axis===0){ const x=proj.toX(node.split/COSLAT);
          ctx.moveTo(x,proj.toY(b.ymax)); ctx.lineTo(x,proj.toY(b.ymin)); }
        else { const y=proj.toY(node.split);
          ctx.moveTo(proj.toX(b.xmin/COSLAT),y); ctx.lineTo(proj.toX(b.xmax/COSLAT),y); }
        ctx.stroke(); walk(node.left); walk(node.right);
      })(KDROOT);
    }
    // incendios (agrupados por color para velocidad)
    if (layers.fires){
      const groups = new Map();
      for (let i=0;i<N;i++){ if(!pass(i)) continue; if(!isFinite(lat[i])) continue;
        const x=proj.toX(lon[i]), y=proj.toY(lat[i]);
        if (x<-5||x>size.w+5||y<-5||y>size.h+5) continue;
        const col=colorOf(i); let g=groups.get(col); if(!g){g=[];groups.set(col,g);}
        g.push(x,y,radiusOf(i)); }
      for (const [col,arr] of groups){ ctx.fillStyle=col;
        for (let k=0;k<arr.length;k+=3){ const r=arr[k+2];
          ctx.beginPath(); ctx.arc(arr[k],arr[k+1],r,0,6.283); ctx.fill(); } }
    }
  },[proj,size,layers,kdDepth,colorMode,sizeMode,regionSel,filters,showDetail]);

  /* ---- overlay: hover, selección, trayectoria animada, traza KDTree ---- */
  const drawOverlay = useCallback((animT)=>{
    const cv = ovRef.current; if(!cv) return; const ctx = setupCanvas(cv);
    ctx.clearRect(0,0,size.w,size.h);
    // hover ring
    if (hover>=0){ const x=proj.toX(lon[hover]), y=proj.toY(lat[hover]);
      ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(x,y,5,0,6.283); ctx.stroke(); }
    if (selected<0) return;
    const i=selected, ox=proj.toX(lon[i]), oy=proj.toY(lat[i]);
    const hasSnap = snap[i]>0 && inBox[i];
    const tx=proj.toX(nlLon[i]), ty=proj.toY(nlLat[i]);
    // traza KDTree (nodos visitados) si está la capa
    if (showDetail && layers.kdtree && inBox[i]){
      const { visited } = kdNearestTrace(lon[i], lat[i]);
      const upto = Math.floor(visited.length * Math.min(animT*1.2,1));
      ctx.fillStyle='rgba(245,158,11,.9)';
      for (let v=0; v<upto; v++){ const j=visited[v];
        ctx.beginPath(); ctx.arc(proj.toX(LANDX[j]), proj.toY(LANDY[j]), 2.2, 0,6.283); ctx.fill(); }
    }
    // celda destino
    if (inBox[i]){ ctx.strokeStyle='#16a34a'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(tx,ty,6,0,6.283); ctx.stroke(); }
    // trayectoria gris->verde (animada)
    if (hasSnap){
      const px = ox+(tx-ox)*animT, py = oy+(ty-oy)*animT;
      ctx.lineWidth=2.5; ctx.strokeStyle='rgba(150,160,170,.5)';
      ctx.setLineDash([5,4]); ctx.beginPath(); ctx.moveTo(ox,oy); ctx.lineTo(tx,ty); ctx.stroke();
      ctx.setLineDash([]);
      // punto viajero gris->verde
      const g=Math.round(150+ (160-150)*0+ 90*animT), r=Math.round(150-110*animT), bl=Math.round(160-120*animT);
      ctx.fillStyle=`rgb(${r},${g+animT*40},${bl})`;
      ctx.beginPath(); ctx.arc(px,py,5,0,6.283); ctx.fill();
      ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.stroke();
    }
    // origen
    ctx.fillStyle = hasSnap?'#9aa7b4':'#3b82f6';
    ctx.beginPath(); ctx.arc(ox,oy, hasSnap?4:6, 0,6.283); ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
  },[proj,size,hover,selected,layers,showDetail]);

  /* anima al seleccionar */
  useEffect(()=>{
    cancelAnimationFrame(animRef.current.raf);
    if (selected<0){ drawOverlay(1); return; }
    let start=null;
    const step=(ts)=>{ if(start==null) start=ts; const t=Math.min((ts-start)/900,1);
      drawOverlay(t); if(t<1) animRef.current.raf=requestAnimationFrame(step); };
    animRef.current.raf=requestAnimationFrame(step);
    return ()=>cancelAnimationFrame(animRef.current.raf);
  },[selected,drawOverlay]);
  useEffect(()=>{ drawOverlay(selected<0?1:1); },[hover,proj]); // redibuja en hover/zoom

  /* ---- picking ---- */
  const pick = (mx,my)=>{
    const lo=proj.toLon(mx), la=proj.toLat(my); let best=-1, bd=14*14;
    const ci=Math.floor(lo/BIN), cj=Math.floor(la/BIN);
    for(let a=-1;a<=1;a++)for(let b=-1;b<=1;b++){ const arr=bins.get((ci+a)+'_'+(cj+b)); if(!arr)continue;
      for(const i of arr){ if(!pass(i))continue; const dx=proj.toX(lon[i])-mx, dy=proj.toY(lat[i])-my;
        const d=dx*dx+dy*dy; if(d<bd){bd=d;best=i;} } }
    return best;
  };

  /* ---- interacción mouse ---- */
  const drag = useRef(null);
  const onDown = (e)=>{ drag.current={x:e.clientX,y:e.clientY,cx:view.cx,cy:view.cy,moved:false}; };
  const onMove = (e)=>{
    const r=e.currentTarget.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;
    if (drag.current){ const d=drag.current, dx=e.clientX-d.x, dy=e.clientY-d.y, cos=proj.cos;
      if(Math.abs(dx)+Math.abs(dy)>3) d.moved=true;
      setView(v=>clampView({...v, cx:d.cx - dx/(v.scale*cos), cy:d.cy + dy/v.scale}));
      return; }
    const i=pick(mx,my); setHover(i);
    if (i>=0) setTip({x:e.clientX+12,y:e.clientY+12, i});
    else setTip(null);
  };
  const onUp = (e)=>{ const d=drag.current; drag.current=null;
    if (d && !d.moved){ const r=e.currentTarget.getBoundingClientRect();
      const i=pick(e.clientX-r.left,e.clientY-r.top); setSelected(i); } };
  const onWheel = (e)=>{ e.preventDefault(); const r=e.currentTarget.getBoundingClientRect();
    const mx=e.clientX-r.left, my=e.clientY-r.top;
    const lo=proj.toLon(mx), la=proj.toLat(my);
    setView(v=>{ const ns=Math.max(6,Math.min(2200, v.scale*(e.deltaY<0?1.18:1/1.18)));
      const cos=Math.cos(v.cy*Math.PI/180)||1;
      return clampView({...v, scale:ns, cx: lo-(mx-size.w/2)/(ns*cos), cy: la+(my-size.h/2)/ns}); }); };

  const zoomBtn = (f)=> setView(v=>clampView({...v, scale:v.scale*f}));
  const goTo = (i)=>{ if(i<0||i>=N)return; setSelected(i);
    setView(v=>clampView({...v, cx:lon[i], cy:lat[i], scale:Math.max(v.scale,140)})); };

  /* ---- contadores en vivo ---- */
  const counts = useMemo(()=>{ const c=Object.fromEntries(QL.map(q=>[q,0])); let tot=0;
    for(let i=0;i<N;i++){ if(!pass(i))continue; c[QL[quality[i]]]++; tot++; } c._tot=tot; return c; },[regionSel,filters]);

  /* ---- UI helpers ---- */
  const seg=(val,set,opts)=> h('div',{className:'seg'}, opts.map(([v,lbl])=>
    h('button',{key:v,className:val===v?'on':'',onClick:()=>set(v)}, lbl)));
  const toggleLayer=(k)=> setLayers(l=>({...l,[k]:!l[k]}));
  const toggleSet=(setter,cur,v)=>{ const n=new Set(cur); n.has(v)?n.delete(v):n.add(v); setter(n); };

  const sel = selected>=0 ? selected : -1;
  const fmt=(x,d=0)=> (x==null||!isFinite(x))?'—':Number(x).toLocaleString('es-CL',{maximumFractionDigits:d});

  return h('div',{className:'app'},
    /* ---------------- sidebar ---------------- */
    h('div',{className:'side'},
      h('h1',null,'Pipeline ERA5 · salto a tierra'),
      h('div',{className:'sub'}, `${fmt(N)} incendios (2012–2018). Grilla ERA5-Land ${GRID.nlat}×${GRID.nlon}; el KDTree indexa ${fmt(LANDX.length)} celdas de tierra. Acerca el zoom a la zona de estudio para ver la grilla, el árbol y los saltos.`),

      h('div',{className:'grp'},
        h('h2',null,'Color de los puntos'),
        seg(colorMode,setColorMode,[['quality','calidad'],['label','L1/L2'],['snap','salto km']])),

      h('div',{className:'grp'},
        h('h2',null,'Tamaño'),
        seg(sizeMode,setSizeMode,[['fixed','fijo'],['area','área'],['frp','FRP']])),

      h('div',{className:'grp'},
        h('h2',null,'Capas'),
        [['chile','Silueta Chile'],['fires','Incendios'],['grid','Grilla ERA5'],
         ['kdtree','Partición KDTree'],['coast','Bordes celda'],['arrows','Saltos (selección)']]
        .map(([k,lbl])=> h('label',{key:k,className:'ck'},
          h('input',{type:'checkbox',checked:layers[k],onChange:()=>toggleLayer(k)}), lbl)),
        !showDetail && h('div',{className:'sub',style:{marginTop:6}}, 'La grilla y el KDTree aparecen al acercar el zoom.')),

      h('div',{className:'grp'},
        h('h2',null,`Profundidad KDTree: ${kdDepth}`),
        h('input',{type:'range',min:1,max:24,value:kdDepth,onChange:e=>setKdDepth(+e.target.value)})),

      h('div',{className:'grp legend'},
        h('h2',null, colorMode==='quality'?'Leyenda · calidad':colorMode==='label'?'Leyenda · etiqueta':'Leyenda · salto'),
        colorMode==='quality' && QL.map(q=> h('label',{key:q,className:'ck'},
          h('input',{type:'checkbox',checked:filters.quals.has(Q[q]),
            onChange:()=>setFilters(f=>({...f,quals:(()=>{const n=new Set(f.quals);n.has(Q[q])?n.delete(Q[q]):n.add(Q[q]);return n;})()}))}),
          h('span',{className:'chip',style:{background:QCOLORS[q]}}),
          h('span',{style:{flex:1}}, q),
          h('span',{className:'cnt'}, fmt(counts[q])))),
        colorMode==='label' && [['none','#64748b','sin etiqueta'],['l1','#f59e0b','L1 (área)'],['l2','#dc2626','L2 (EWE)'],['both','#a855f7','ambas']]
          .map(([k,c,lbl])=> h('div',{key:k,className:'row'}, h('span',{className:'chip',style:{background:c}}), lbl)),
        colorMode==='snap' && h('div',{className:'sub'}, 'Gris = sin salto · verde = salto a tierra (más claro = más lejos, hasta 6 km).')),

      h('div',{className:'grp'},
        h('h2',null,'Filtros'),
        h('div',{className:'row'},'Años ', h('input',{type:'number',min:Y0,max:Y1,value:filters.y0,style:{width:60},
          onChange:e=>setFilters(f=>({...f,y0:+e.target.value}))}), '–',
          h('input',{type:'number',min:Y0,max:Y1,value:filters.y1,style:{width:60},
          onChange:e=>setFilters(f=>({...f,y1:+e.target.value}))})),
        h('label',{className:'ck',style:{margin:'6px 0'}},
          h('input',{type:'checkbox',checked:filters.onlySnapped,
            onChange:e=>setFilters(f=>({...f,onlySnapped:e.target.checked}))}), 'Solo los que saltaron'),
        h('div',{className:'row'}, `Salto ≤ ${filters.snapMax} km`,
          h('input',{type:'range',min:0,max:6,step:0.5,value:filters.snapMax,
            onChange:e=>setFilters(f=>({...f,snapMax:+e.target.value}))})),
        h('details',null, h('summary',{style:{cursor:'pointer',fontSize:12,color:'var(--muted)'}}, `Regiones (${regionSel.size}/${RL.length})`),
          h('div',{style:{maxHeight:140,overflow:'auto',marginTop:4}},
            h('div',{className:'row'},
              h('button',{onClick:()=>setRegionSel(new Set(RL.map((_,i)=>i)))},'todas'),
              h('button',{onClick:()=>setRegionSel(new Set())},'ninguna')),
            RL.map((rn,ri)=> h('label',{key:ri,className:'ck'},
              h('input',{type:'checkbox',checked:regionSel.has(ri),
                onChange:()=>toggleSet(setRegionSel,regionSel,ri)}), rn))))),

      h('div',{className:'grp'},
        h('h2',null,'Ir a incendio'),
        h('div',{className:'row'},
          h('input',{type:'text',placeholder:'índice 0–'+(N-1),style:{flex:1},
            onKeyDown:e=>{ if(e.key==='Enter'){ const v=parseInt(e.target.value,10); if(isFinite(v)) goTo(v);} }}),
          h('small',null,'Enter'))),
      h('div',{className:'sub',style:{paddingTop:8}}, `Mostrando ${fmt(counts._tot)} de ${fmt(N)}.`)
    ),

    /* ---------------- stage ---------------- */
    h('div',{className:'stage',ref:wrapRef},
      h('canvas',{ref:baseRef}),
      h('canvas',{ref:ovRef, style:{cursor: hover>=0?'pointer':'grab'},
        onMouseDown:onDown, onMouseMove:onMove, onMouseUp:onUp,
        onMouseLeave:()=>{drag.current=null;setHover(-1);setTip(null);}, onWheel:onWheel}),
      h('div',{className:'zoombtns'},
        h('button',{onClick:()=>zoomBtn(1.4)},'+'),
        h('button',{onClick:()=>zoomBtn(1/1.4)},'–'),
        h('button',{title:'reset',style:{fontSize:11},onClick:()=>setView({cx:(BB.west+BB.east)/2,cy:-38,scale:9})},'⟲')),
      h('div',{className:'hint'}, showDetail? 'Zona de estudio · grilla y KDTree activos. Click en un incendio para ver su salto.'
        : 'Vista Chile. Rueda = zoom, arrastrar = mover. Acércate al centro-sur.'),
      tip && h('div',{className:'tip',style:{left:tip.x,top:tip.y}},
        `${RL[region[tip.i]]} · ${QL[quality[tip.i]]}` + (snap[tip.i]>0?` · salto ${snap[tip.i].toFixed(1)}km`:'')),
      sel>=0 && h('div',{className:'detail'},
        h('span',{className:'close',onClick:()=>setSelected(-1)},'✕'),
        h('h3',null,`Incendio #${sel}`),
        h('table',null, h('tbody',null,
          h('tr',null,h('td',null,'Región'),h('td',null,RL[region[sel]])),
          h('tr',null,h('td',null,'Año'),h('td',null,year[sel]||'—')),
          h('tr',null,h('td',null,'Calidad match'),h('td',null,QL[quality[sel]])),
          h('tr',null,h('td',null,'Salto a tierra'),h('td',null, snap[sel]>0?`${snap[sel].toFixed(2)} km`:'—')),
          h('tr',null,h('td',null,'Área quemada'),h('td',null, area[sel]>0?`${fmt(area[sel],0)} ha`:'—')),
          h('tr',null,h('td',null,'FRP máx'),h('td',null, frp[sel]>0?`${fmt(frp[sel],0)} MW`:'—')),
          h('tr',null,h('td',null,'Etiquetas'),h('td',null, (L1[sel]?'L1 ':'')+(L2[sel]?'L2':'')||'ninguna')),
          h('tr',null,h('td',null,'lat, lon'),h('td',null,`${lat[sel].toFixed(3)}, ${lon[sel].toFixed(3)}`))
        )))
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
